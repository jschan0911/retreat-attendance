<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수련회 참석 조사 관리자</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell admin-shell">
      <section class="intro-panel" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">운영 도구</p>
          <h1 id="page-title">참석 현황 관리</h1>
          <p class="intro-copy">신청 목록을 조회하고 참석 정보, 합류 시점, 상태를 수정합니다.</p>
        </div>
        <a class="text-link" href="./index.html">신청 페이지</a>
      </section>

      <section class="form-panel admin-panel" aria-label="운영 도구">
        <div class="admin-toolbar">
          <label class="field" for="searchInput">
            <span>검색</span>
            <input id="searchInput" type="search" placeholder="이름, 교회, 참석여부" />
          </label>
          <button id="refreshButton" type="button">새로고침</button>
        </div>

        <p id="adminMessage" class="form-message" role="status"></p>

        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>이름</th>
                <th>교회</th>
                <th>성별</th>
                <th>출생연도</th>
                <th>참석여부</th>
                <th>합류 시점</th>
                <th>퇴소 시점</th>
                <th>납부</th>
                <th>상태</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="responseRows">
              <tr>
                <td colspan="10" class="empty-cell">목록을 불러오는 중입니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <template id="rowTemplate">
      <tr>
        <td>
          <input name="name" aria-label="이름" required />
          <small data-field="submittedAt"></small>
        </td>
        <td>
          <select name="church" aria-label="소속 교회" required>
            <option value="은정교회">은정교회</option>
            <option value="은현교회">은현교회</option>
            <option value="의정부 좋은나무교회">의정부 좋은나무교회</option>
          </select>
        </td>
        <td>
          <select name="gender" aria-label="성별" required>
            <option value="남">남</option>
            <option value="여">여</option>
          </select>
        </td>
        <td><input name="birthYear" type="number" min="1970" aria-label="출생연도" /></td>
        <td>
          <select name="attendance" aria-label="참석여부" required>
            <option value="풀참">풀참</option>
            <option value="부분참">부분참</option>
            <option value="미정">미정</option>
          </select>
        </td>
        <td class="join-cell">
          <input name="joinDate" type="date" aria-label="합류일" />
          <select name="joinPeriod" aria-label="합류 시간대">
            <option value="">시간대 없음</option>
            <option value="새벽 (00:00~06:00)">새벽 (00:00~06:00)</option>
            <option value="아침 (06:00~09:00)">아침 (06:00~09:00)</option>
            <option value="오전 (09:00~12:00)">오전 (09:00~12:00)</option>
            <option value="점심 (12:00~14:00)">점심 (12:00~14:00)</option>
            <option value="오후 (14:00~18:00)">오후 (14:00~18:00)</option>
            <option value="저녁 (18:00~21:00)">저녁 (18:00~21:00)</option>
            <option value="밤 (21:00~24:00)">밤 (21:00~24:00)</option>
          </select>
          <input name="joinNote" aria-label="합류 메모" placeholder="합류 메모" />
          <textarea name="note" aria-label="비고" rows="2" placeholder="비고"></textarea>
        </td>
        <td class="schedule-cell">
          <input name="leaveDate" type="date" aria-label="퇴소일" />
          <select name="leavePeriod" aria-label="퇴소 시간대">
            <option value="">시간대 없음</option>
            <option value="새벽 (00:00~06:00)">새벽 (00:00~06:00)</option>
            <option value="아침 (06:00~09:00)">아침 (06:00~09:00)</option>
            <option value="오전 (09:00~12:00)">오전 (09:00~12:00)</option>
            <option value="점심 (12:00~14:00)">점심 (12:00~14:00)</option>
            <option value="오후 (14:00~18:00)">오후 (14:00~18:00)</option>
            <option value="저녁 (18:00~21:00)">저녁 (18:00~21:00)</option>
            <option value="밤 (21:00~24:00)">밤 (21:00~24:00)</option>
          </select>
          <input name="leaveNote" aria-label="퇴소 메모" placeholder="퇴소 메모" />
        </td>
        <td class="payment-cell">
          <select name="paymentStatus" aria-label="납부 상태">
            <option value="미납">미납</option>
            <option value="완납">완납</option>
            <option value="부분납">부분납</option>
            <option value="면제">면제</option>
            <option value="환불">환불</option>
          </select>
          <input name="paymentAmount" type="number" min="0" aria-label="납부금액" placeholder="금액" />
          <select name="paymentMethod" aria-label="납부 방식">
            <option value="">방식 없음</option>
            <option value="계좌이체">계좌이체</option>
            <option value="현금">현금</option>
            <option value="카드">카드</option>
            <option value="기타">기타</option>
          </select>
          <input name="paymentNote" aria-label="납부 메모" placeholder="납부 메모" />
        </td>
        <td>
          <select name="status" aria-label="상태" required>
            <option value="접수">접수</option>
            <option value="확인">확인</option>
            <option value="취소">취소</option>
          </select>
        </td>
        <td class="row-actions">
          <button type="button" data-action="save">저장</button>
          <button type="button" data-action="delete" class="danger-button">삭제</button>
        </td>
      </tr>
    </template>

    <script src="./config.js"></script>
    <script src="./admin.js"></script>
  </body>
</html>
